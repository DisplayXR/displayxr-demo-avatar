name: Build Linux

# avatar Linux build-green dev loop (issue #21; part of the M8 Linux epic, meta
# displayxr-runtime#699; recipe: the runtime repo's docs/guides/linux-demo-port.md).
#
# TRI-LTS MATRIX (mirrors displayxr-demo-modelviewer): the deployment target is
# Ubuntu 26.04 + Intel iGPU, but we also keep 22.04 (where render can be
# validated on hand today) and 24.04 green — so "build-green" means "builds on
# every supported toolchain (GCC 11 / 13 / 15)", not just whatever
# ubuntu-latest happens to be. 22.04/24.04 use hosted runners; 26.04 runs in a
# container (no hosted 26.04 runner yet).
#
# DELIBERATELY NOT a required check. It does NOT run on PRs or pushes to main —
# only on manual dispatch and `linux*` branches — so it can't gate unrelated
# work while the port is in progress. Promote to a PR-triggered required check
# (with the DetectChanges docs_only short-circuit the macOS/Windows jobs use)
# only once it passes reliably.
#
# Build-green scope: compile avatar_handle_vk_linux. CI has no display/GPU, so
# the app is never run here; on-screen validation is a separate pass gated on
# the runtime's Linux Phase 1b/3b + hardware.

on:
  workflow_dispatch: {}
  push:
    branches:
      - 'linux'
      - 'linux-**'
      - 'feature/linux-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    name: Build (Ubuntu ${{ matrix.lts }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lts: "22.04"
            runner: ubuntu-22.04
          - lts: "24.04"
            runner: ubuntu-24.04
          - lts: "26.04"
            runner: ubuntu-latest
            container: ubuntu:26.04
    steps:
      # In the 26.04 container we start as root with a bare image — install git
      # BEFORE checkout (which shells out to git). No-op on the hosted runners.
      - name: Bootstrap container (git for checkout)
        run: |
          if [ "$(id -u)" = "0" ] && ! command -v git >/dev/null; then
            apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          fi

      - uses: actions/checkout@v5

      # Base list (docs/guides/linux-demo-port.md): the toolchain + system
      # Vulkan + glslang (model_common compiles its PBR SPIR-V with
      # glslangValidator, hard-required). The avatar demo is a Vulkan model/PBR
      # renderer with NO media deps, so — unlike the mediaplayer — no FFmpeg.
      #
      # X11 / Wayland / ALSA dev headers + the GLX-flip pair (libxxf86vm-dev +
      # libxcb-glx0-dev): the app itself is hosted-NULL (links no window toolkit
      # yet), but these are the standard demo-port deps and guard the from-source
      # OpenXR-SDK loader build against the GLX-flip gotcha should GL/EGL headers
      # ever be pulled in (see the playbook).
      # SUDO shim so the same step works on hosted runners (non-root, has sudo)
      # and in the container (root, no sudo).
      - name: Install dependencies
        run: |
          SUDO=""; [ "$(id -u)" != "0" ] && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y \
            build-essential cmake ninja-build pkg-config git ca-certificates curl \
            libvulkan-dev vulkan-validationlayers glslang-tools \
            libx11-dev libxcb1-dev libx11-xcb-dev \
            libwayland-dev libasound2-dev \
            libxxf86vm-dev libxcb-glx0-dev

      - name: Build (build-green; app is not run — no display on CI)
        run: ./scripts/build_linux.sh

      # Guard against a hollow green: Vulkan must have resolved (the renderer is
      # 100% Vulkan) and the binary must exist. build_linux.sh already errors if
      # the binary is missing; assert Vulkan here so a silent FindVulkan miss
      # fails loudly rather than compiling out.
      - name: Assert Vulkan resolved + binary built
        run: |
          grep -q "Vulkan_LIBRARY:.*=.*/" build/CMakeCache.txt || {
            echo "::error::Vulkan was not found via find_package — the model renderer cannot build"; exit 1; }
          test -x build/linux/avatar_handle_vk_linux || {
            echo "::error::avatar_handle_vk_linux was not produced"; exit 1; }
